<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fyna Essência | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="inicio">
        <div class="brand-header">
            <img src="./Fyna2.PNG" alt="Logo Fyna Essência" class="main-logo">
            <div class="logo-text">FYNA <span>ESSÊNCIA</span></div>
        </div>
        <button class="share-btn" onclick="compartilhar()" title="Compartilhar Catálogo">
            <i class="fa-solid fa-share-nodes"></i>
        </button>
    </header>

    <section class="slider-box">
        <div class="slider-wrapper" id="slider">
            <div class="slide"><img src="./preto.png" alt="Banner 1"></div>
            <div class="slide"><img src="./slibranco.png" alt="Banner 2"></div>
            <div class="slide"><img src="./gold.png" alt="Banner 3"></div>
        </div>
        <div class="dots-container">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </section>

    <main class="container" id="catalogo">
        <h2 class="section-title">Coleção Exclusiva</h2>
        <div class="product-grid">
            
            <div class="card">
                <div class="img-container">
                    <img id="view1" src="https://leloynparfums.com.br/cdn/shop/files/dd1d1c0b7eb1de1168a15fedf935517e.jpg?v=1769533438&width=1600" class="img-principal" onclick="abrirZoom(this)">
                    <button class="nav-arrow left" onclick="moverGaleria('view1', -1)">&#10094;</button>
                    <button class="nav-arrow right" onclick="moverGaleria('view1', 1)">&#10095;</button>
                </div>
                <div class="card-info">
                    <h3>IDOLE L'INTENSE EDP</h3>
                    <p class="vol">75ml 2.5 fl.oz</p>
                    <button class="btn-acao" onclick="zap('IDOLE L\'INTENSE')">Consultar</button>
                </div>
            </div>

            <div class="card">
                <div class="img-container">
                    <img id="view2" src="https://leloynparfums.com.br/cdn/shop/files/PRODUTOSLELOYN-2024-08-12T112002.454.png?v=1769565701&width=832" class="img-principal" onclick="abrirZoom(this)">
                    <button class="nav-arrow left" onclick="moverGaleria('view2', -1)">&#10094;</button>
                    <button class="nav-arrow right" onclick="moverGaleria('view2', 1)">&#10095;</button>
                </div>
                <div class="card-info">
                    <h3>PRADA PARADOXE</h3>
                    <p class="vol">30ml 1 fl.oz</p>
                    <button class="btn-acao" onclick="zap('Prada paradoxe')">Consultar</button>
                </div>
            </div>

            </div>
    </main>

    <div id="modalZoom" class="modal-zoom" onclick="fecharZoom()">
        <span class="fechar-zoom">&times;</span>
        <img id="imgZoom" src="" alt="Zoom">
    </div>

    <nav class="bottom-menu">
        <a href="#inicio" class="menu-item"><i class="fa-solid fa-house"></i><small>Início</small></a>
        <a href="#catalogo" class="menu-item"><i class="fa-solid fa-book-open"></i><small>Catálogo</small></a>
        <a href="https://wa.me/5588996828800" class="menu-item"><i class="fa-brands fa-whatsapp"></i><small>WhatsApp</small></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
