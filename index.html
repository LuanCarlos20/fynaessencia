<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fyna Essência | Catálogo Luxo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="inicio">
        <div class="brand-header">
            <img src="./Fyna2.PNG" alt="Logo" class="main-logo">
            <div class="logo-text">FYNA <span>ESSÊNCIA</span></div>
        </div>
        <button class="share-btn" onclick="compartilhar()"><i class="fa-solid fa-share-nodes"></i></button>
    </header>

    <section class="slider-box">
        <div class="slider-wrapper" id="slider">
            <div class="slide"><img src="./preto.png"></div>
            <div class="slide"><img src="./slibranco.png"></div>
            <div class="slide"><img src="./gold.png"></div>
        </div>
    </section>

    <main class="container" id="catalogo">
        <h2 class="section-title">Coleção Exclusiva</h2>
        <div class="product-grid">
            
            <div class="card" onclick="abrirDetalhes('IDOLE L\'INTENSE', 'Uma fragrância chipre floral feminina. Notas de Rosa de Grasse e Jasmim, com fundo de baunilha e patchouli. Perfeito para mulheres decididas.', ['https://leloynparfums.com.br/cdn/shop/files/dd1d1c0b7eb1de1168a15fedf935517e.jpg?v=1769533438&width=1600', 'https://leloynparfums.com.br/cdn/shop/files/a8e26ac3947f1fce74ed6bfd0bf2f84f.jpg?v=1769533440&width=1600'])">
                <img src="https://leloynparfums.com.br/cdn/shop/files/dd1d1c0b7eb1de1168a15fedf935517e.jpg?v=1769533438&width=1600" class="img-principal">
                <div class="card-info">
                    <h3>IDOLE L'INTENSE</h3>
                    <p class="volumetria">75ml 2.5 fl.oz</p>
                    <span class="view-more">Ver Detalhes</span>
                </div>
            </div>

            <div class="card" onclick="abrirDetalhes('PRADA PARADOXE', 'A reinvenção do floral. Notas de Âmbar e Almíscar que trazem uma sofisticação atemporal e moderna.', ['https://leloynparfums.com.br/cdn/shop/files/PRODUTOSLELOYN-2024-08-12T112002.454.png?v=1769565701&width=832', 'https://leloynparfums.com.br/cdn/shop/files/PRODUTOSLELOYN-2024-08-12T111811.132.png?v=1769565704&width=832'])">
                <img src="https://leloynparfums.com.br/cdn/shop/files/PRODUTOSLELOYN-2024-08-12T112002.454.png?v=1769565701&width=832" class="img-principal">
                <div class="card-info">
                    <h3>PRADA PARADOXE</h3>
                    <p class="volumetria">75ml 2.5 fl.oz</p>
                    <span class="view-more">Ver Detalhes</span>
                </div>
            </div>

            </div>
    </main>

    <div id="modalProduto" class="modal-produto">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharDetalhes()">&times;</span>
            <div class="modal-gallery">
                <div class="gallery-wrapper" id="galleryWrapper"></div>
                <button class="nav-gal btn-prev" onclick="moveGal(-1)">&#10094;</button>
                <button class="nav-gal btn-next" onclick="moveGal(1)">&#10095;</button>
            </div>
            <div class="modal-body">
                <h2 id="modalNome"></h2>
                <p class="modal-vol">75ml 2.5 fl.oz</p>
                <p id="modalDesc"></p>
                <button id="btnZapModal" class="btn-acao-modal">Pedir no WhatsApp</button>
            </div>
        </div>
    </div>

    <nav class="bottom-menu">
        <a href="#inicio" class="menu-item"><i class="fa-solid fa-house"></i><small>Início</small></a>
        <a href="#catalogo" class="menu-item"><i class="fa-solid fa-book-open"></i><small>Catálogo</small></a>
        <a href="https://wa.me/5588996828800" class="menu-item"><i class="fa-brands fa-whatsapp"></i><small>WhatsApp</small></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
