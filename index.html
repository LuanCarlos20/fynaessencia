<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Fyna Essência | Catálogo</title>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

    <link rel="stylesheet" href="style.css"/>
</head>

<body>

    <!-- HEADER -->
    <header id="inicio">
        <div class="brand-header">
            <img src="./Fyna2.PNG" alt="Logo" class="main-logo">

            <div class="logo-text">
                FYNA <span>ESSÊNCIA</span>
            </div>
        </div>

        <button class="share-btn" onclick="compartilhar()">
            <i class="fa-solid fa-share-nodes"></i>
        </button>
    </header>

    <section class="hero">
        <div class="overlay"></div>

        <div class="hero-content">
            <h1>Perfumes Exclusivos</h1>
            <p>Elegância, sofisticação e fragrâncias marcantes.</p>
        </div>
    </section>

    <!-- PRODUTOS -->
    <main class="container">

        <h2 class="section-title">Coleção Exclusiva</h2>

        <div class="product-grid">

            <!-- CARD 1 -->
            <div class="card">
                <img
                    src="https://leloynparfums.com.br/cdn/shop/files/dd1d1c0b7eb1de1168a15fedf935517e.jpg?v=1769533438&width=1600"
                    class="img-principal"
                >

                <div class="card-info">
                    <h3>IDOLE L'INTENSE EAU DE PARFUM</h3>

                    <button class="btn-acao" onclick="zap('IDOLE L INTENSE')">
                        Consultar
                    </button>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="card">
                <img
                    src="https://leloynparfums.com.br/cdn/shop/files/PRODUTOSLELOYN-2024-08-12T112002.454.png?v=1769565701&width=832"
                    class="img-principal"
                >

                <div class="card-info">
                    <h3>PRADA PARADOXE</h3>

                    <button class="btn-acao" onclick="zap('Prada Paradoxe')">
                        Consultar
                    </button>
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="card">
                <img
                    src="https://leloynparfums.com.br/cdn/shop/files/72198.png?v=1769559498&width=832"
                    class="img-principal"
                >

                <div class="card-info">
                    <h3>TRÉSOR LA NUIT</h3>

                    <button class="btn-acao" onclick="zap('Trésor La Nuit')">
                        Consultar
                    </button>
                </div>
            </div>

            <!-- CARD 4 -->
            <div class="card">
                <img
                    src="https://leloynparfums.com.br/cdn/shop/files/72172.png?v=1769547207&width=832"
                    class="img-principal"
                >

                <div class="card-info">
                    <h3>MY WAY GIORGIO ARMANI</h3>

                    <button class="btn-acao" onclick="zap('My Way Giorgio Armani')">
                        Consultar
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- MENU -->
    <nav class="bottom-menu">

        <a href="#inicio" class="menu-item">
            <i class="fa-solid fa-house"></i>
            <small>Início</small>
        </a>

        <a href="#" class="menu-item">
            <i class="fa-solid fa-book-open"></i>
            <small>Catálogo</small>
        </a>

        <a href="https://wa.me/5588996828800" class="menu-item">
            <i class="fa-brands fa-whatsapp"></i>

        </a>
