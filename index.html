<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fyna Essência | Catálogo Luxo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="inicio">
        <div class="brand-header">
            <img src="./Fyna2.PNG" alt="Logo" class="main-logo">
            <div class="logo-text">FYNA <span>ESSÊNCIA</span></div>
        </div>
        <button class="share-btn" onclick="compartilhar()"><i class="fa-solid fa-share-nodes"></i></button>
    </header>

    <section class="slider-box">
        <div class="slider-wrapper" id="slider">
            <div class="slide"><img src="./preto.png"></div>
            <div class="slide"><img src="./slibranco.png"></div>
            <div class="slide"><img src="./gold.png"></div>
        </div>
    </section>

    <main class="container" id="catalogo">
        <h2 class="section-title">Fragrâncias Exclusivas</h2>
        <div class="product-grid">
            
            <div class="card" onclick="abrirDetalhes('IDOLE L\'INTENSE', '75ml 2.5 fl.oz', 'Um perfume Chipre Floral Feminino.', ['https://leloynparfums.com.br/cdn/shop/files/dd1d1c0b7eb1de1168a15fedf935517e.jpg?v=1769533438&width=1600', 'https://leloynparfums.com.br/cdn/shop/files/a8e26ac3947f1fce74ed6bfd0bf2f84f.jpg?v=1769533440&width=1600'])">
                <div class="img-box"><img src="https://leloynparfums.com.br/cdn/shop/files/dd1d1c0b7eb1de1168a15fedf935517e.jpg?v=1769533438&width=1600"></div>
                <div class="card-info">
                    <h3>IDOLE L'INTENSE</h3>
                    <p class="vol">75ml 2.5 fl.oz</p>
                    <span class="btn-ver">Ver detalhes</span>
                </div>
            </div>

            </div>
    </main>

    <div id="modalProduto" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharDetalhes()">&times;</span>
            
            <div class="modal-gallery">
                <div id="galleryWrapper" class="gallery-wrapper"></div>
                <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
                <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>
            </div>

            <div class="modal-details">
                <h2 id="mNome"></h2>
                <p id="mVol" class="mVol"></p>
                <p id="mDesc"></p>
                <button id="btnZap" class="btn-zap">Pedir no WhatsApp</button>
            </div>
        </div>
    </div>

    <nav class="bottom-menu">
        <a href="#inicio" class="menu-item"><i class="fa-solid fa-house"></i><small>Início</small></a>
        <a href="#catalogo" class="menu-item"><i class="fa-solid fa-book-open"></i><small>Catálogo</small></a>
        <a href="https://wa.me/5588996828800" class="menu-item"><i class="fa-brands fa-whatsapp"></i><small>Zap</small></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
